<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>BM 영업일지</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
  :root {
    --navy: #005C51;
    --navy-mid: #00796B;
    --navy-light: #00C7A9;
    --navy-pale: #E0F7F4;
    --green: #00A896;
    --green-pale: #DFFAF5;
    --amber: #E8890C;
    --amber-pale: #FEF3E0;
    --red: #D94040;
    --surface: #F4F6F9;
    --card: #FFFFFF;
    --border: rgba(0,0,0,0.08);
    --border-mid: rgba(0,0,0,0.14);
    --text-primary: #0D1B2A;
    --text-secondary: #5A6B7D;
    --text-hint: #95A4B3;
    --radius-sm: 8px;
    --radius-md: 12px;
    --radius-lg: 18px;
    --radius-xl: 24px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Noto Sans KR', -apple-system, sans-serif;
    background: var(--surface);
    color: var(--text-primary);
    min-height: 100vh;
  }

  /* ── APP SHELL ── */
  .app {
    max-width: 430px;
    margin: 0 auto;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    position: relative;
    isolation: isolate;
  }

  /* ── HEADER ── */
  .app-header {
    background: var(--navy);
    padding: 52px 20px 20px;
    position: relative;
    overflow: hidden;
  }
  .app-header::before {
    content: '';
    position: absolute;
    top: -40px; right: -40px;
    width: 160px; height: 160px;
    border-radius: 50%;
    background: rgba(255,255,255,0.04);
  }
  .app-header::after {
    content: '';
    position: absolute;
    bottom: -20px; right: 30px;
    width: 90px; height: 90px;
    border-radius: 50%;
    background: rgba(255,255,255,0.03);
  }
  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 6px;
  }
  .header-badge {
    background: rgba(255,255,255,0.12);
    color: rgba(255,255,255,0.85);
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 20px;
    letter-spacing: 0.3px;
  }
  .header-date {
    color: rgba(255,255,255,0.5);
    font-size: 11px;
  }
  .header-title {
    color: #FFFFFF;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }
  .header-sub {
    color: rgba(255,255,255,0.55);
    font-size: 13px;
    margin-top: 2px;
  }

  /* ── SCREEN SYSTEM ── */
  .screen {
    display: none;
    flex-direction: column;
    flex: 1;
  }
  .screen.active {
    display: flex;
    animation: fadeIn 0.18s ease-out;
  }
  /* 폼 화면은 block으로 자연 스크롤 */
  #screen-schedule.active,
  #screen-plan.active {
    display: block;
    min-height: 100vh;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── MAIN SCREEN ── */
  .main-content { flex: 1; overflow-y: auto; padding-bottom: 24px; -webkit-overflow-scrolling: touch; }

  /* Calendar */
  .cal-card {
    background: var(--card);
    margin: 12px 16px 0;
    border-radius: var(--radius-lg);
    border: 1px solid var(--border);
    overflow: hidden;
  }
  .cal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 12px 8px;
    border-bottom: 1px solid var(--border);
  }
  .cal-title { font-size: 13px; font-weight: 700; color: var(--text-primary); }
  .cal-nav-btn {
    width: 26px; height: 26px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 7px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; color: var(--text-secondary);
    transition: all 0.15s;
  }
  .cal-nav-btn:active { background: var(--navy-pale); color: var(--navy-light); }

  .cal-body { padding: 6px 8px 10px; }
  .cal-weekdays {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    margin-bottom: 2px;
  }
  .cal-weekdays span {
    text-align: center;
    font-size: 10px;
    font-weight: 500;
    padding: 3px 0;
    color: var(--text-hint);
  }
  .cal-weekdays span:first-child { color: #D94040; }
  .cal-weekdays span:last-child { color: var(--navy-light); }

  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 1px;
  }
  .cal-day {
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    border-radius: 50%;
    cursor: pointer;
    position: relative;
    color: var(--text-primary);
    transition: background 0.12s;
  }
  .cal-day:active { background: var(--surface); }
  .cal-day.other-month { color: var(--text-hint); }
  .cal-day.today {
    background: var(--navy);
    color: white;
    font-weight: 700;
  }
  .cal-day.has-schedule::after {
    content: '';
    position: absolute;
    bottom: 3px; left: 50%;
    transform: translateX(-50%);
    width: 4px; height: 4px;
    border-radius: 50%;
    background: var(--green);
  }
  .cal-day.today.has-schedule::after { background: rgba(255,255,255,0.8); }
  .cal-day.has-plan::before {
    content: '';
    position: absolute;
    top: 3px; left: 50%;
    transform: translateX(-50%);
    width: 4px; height: 4px;
    border-radius: 50%;
    background: var(--amber);
  }
  .cal-day.selected {
    outline: 2px solid var(--navy-light);
    outline-offset: 1px;
  }

  /* ── BOTTOM SHEET ── */
  .sheet-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(13,27,42,0.5);
    z-index: 150;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s;
  }
  .sheet-backdrop.visible { opacity: 1; pointer-events: all; }

  .bottom-sheet {
    position: fixed;
    bottom: 0; left: 50%;
    transform: translateX(-50%) translateY(100%);
    width: 100%;
    max-width: 430px;
    background: var(--card);
    border-radius: 24px 24px 0 0;
    z-index: 160;
    transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
    padding: 0 0 32px;
  }
  .bottom-sheet.visible { transform: translateX(-50%) translateY(0); }

  .sheet-handle {
    width: 36px; height: 4px;
    background: var(--border-mid);
    border-radius: 2px;
    margin: 12px auto 0;
  }
  .sheet-title {
    font-size: 15px; font-weight: 700;
    color: var(--text-primary);
    padding: 16px 20px 4px;
  }
  .sheet-date-label {
    font-size: 13px;
    color: var(--navy-light);
    padding: 0 20px 16px;
    font-weight: 500;
  }
  .sheet-divider {
    height: 1px;
    background: var(--border);
    margin: 0 20px 16px;
  }
  .sheet-options {
    display: flex;
    flex-direction: column;
    gap: 10px;
    padding: 0 16px;
  }
  .sheet-option-btn {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    cursor: pointer;
    font-family: inherit;
    text-align: left;
    transition: all 0.15s;
  }
  .sheet-option-btn:active { transform: scale(0.98); }
  .sheet-option-btn.opt-schedule { border-left: 3px solid var(--navy-light); }
  .sheet-option-btn.opt-plan { border-left: 3px solid var(--green); }
  .sheet-opt-icon {
    width: 38px; height: 38px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; flex-shrink: 0;
  }
  .opt-schedule .sheet-opt-icon { background: var(--navy-pale); }
  .opt-plan .sheet-opt-icon { background: var(--green-pale); }
  .sheet-opt-title { font-size: 14px; font-weight: 700; color: var(--text-primary); }
  .sheet-opt-desc { font-size: 12px; color: var(--text-hint); margin-top: 2px; }
  .sheet-cancel-btn {
    width: calc(100% - 32px);
    margin: 12px 16px 0;
    padding: 13px;
    background: none;
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    font-size: 14px;
    color: var(--text-secondary);
    font-family: inherit;
    cursor: pointer;
  }

  /* Stats row */
  .stats-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin: 12px 16px 0;
  }
  .stat-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .stat-icon {
    width: 40px; height: 40px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }
  .stat-card.schedule-stat .stat-icon { background: var(--navy-pale); }
  .stat-card.plan-stat .stat-icon { background: var(--green-pale); }
  .stat-num { font-size: 22px; font-weight: 700; line-height: 1; }
  .stat-card.schedule-stat .stat-num { color: var(--navy-light); }
  .stat-card.plan-stat .stat-num { color: var(--green); }
  .stat-label { font-size: 11px; color: var(--text-hint); margin-top: 2px; }

  /* Main buttons */
  .main-actions {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin: 12px 16px 0;
  }
  .action-btn {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 20px 14px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 12px;
    text-align: left;
    transition: all 0.15s;
    position: relative;
    overflow: hidden;
  }
  .action-btn::after {
    content: '→';
    position: absolute;
    top: 16px; right: 16px;
    font-size: 14px;
    opacity: 0.3;
  }
  .action-btn:active { transform: scale(0.97); }
  .action-btn.btn-schedule { border-top: 3px solid var(--navy-light); }
  .action-btn.btn-plan { border-top: 3px solid var(--green); }

  .action-icon {
    width: 46px; height: 46px;
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
  }
  .btn-schedule .action-icon { background: var(--navy-pale); }
  .btn-plan .action-icon { background: var(--green-pale); }

  .action-btn-title {
    font-size: 15px;
    font-weight: 700;
    color: var(--text-primary);
  }
  .action-btn-desc {
    font-size: 12px;
    color: var(--text-hint);
    margin-top: 2px;
    font-weight: 300;
    line-height: 1.4;
  }

  /* Recent entries */
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 16px 10px;
  }
  .section-title { font-size: 13px; font-weight: 700; color: var(--text-secondary); letter-spacing: 0.3px; }
  .section-more { font-size: 12px; color: var(--navy-light); }

  .recent-list { padding: 0 16px; display: flex; flex-direction: column; gap: 8px; }
  .recent-item {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: 12px 14px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .recent-dot {
    width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
  }
  .recent-dot.schedule { background: var(--navy-light); }
  .recent-dot.plan { background: var(--green); }
  .recent-info { flex: 1; min-width: 0; }
  .recent-location { font-size: 13px; font-weight: 500; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .recent-meta { font-size: 11px; color: var(--text-hint); margin-top: 2px; }
  .recent-type {
    font-size: 10px;
    font-weight: 500;
    padding: 3px 8px;
    border-radius: 20px;
    flex-shrink: 0;
  }
  .recent-type.schedule { background: var(--navy-pale); color: var(--navy-light); }
  .recent-type.plan { background: var(--green-pale); color: var(--green); }

  .empty-state {
    text-align: center;
    padding: 24px;
    color: var(--text-hint);
    font-size: 13px;
  }

  /* ── FORM SCREEN ── */
  .form-header {
    background: var(--card);
    border-bottom: 1px solid var(--border);
    padding: 52px 16px 14px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .back-btn {
    width: 36px; height: 36px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    color: var(--text-secondary);
    flex-shrink: 0;
    transition: all 0.12s;
  }
  .back-btn:active { background: var(--navy-pale); }

  .form-header-info { flex: 1; }
  .form-header-title { font-size: 17px; font-weight: 700; color: var(--text-primary); }
  .form-header-sub { font-size: 12px; color: var(--text-hint); margin-top: 2px; }

  .form-body {
    padding: 14px 16px 120px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  /* Entry card */
  .entry-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
    animation: cardIn 0.2s ease-out;
  }
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .entry-card-header {
    background: var(--surface);
    padding: 10px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }
  .entry-card-label {
    font-size: 11px;
    font-weight: 700;
    color: var(--text-secondary);
    letter-spacing: 0.5px;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .entry-num-badge {
    width: 18px; height: 18px;
    border-radius: 50%;
    background: var(--navy);
    color: white;
    font-size: 10px;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700;
  }
  .entry-remove-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 3px 10px;
    font-size: 11px;
    color: var(--text-hint);
    cursor: pointer;
    font-family: inherit;
    transition: all 0.12s;
  }
  .entry-remove-btn:active { border-color: var(--red); color: var(--red); }

  .entry-card-body { padding: 14px; display: flex; flex-direction: column; gap: 12px; }

  /* Date selector */
  .date-group {
    display: grid;
    grid-template-columns: 2fr 1.5fr 1.5fr;
    gap: 6px;
  }
  .field-label {
    font-size: 11px;
    font-weight: 500;
    color: var(--text-secondary);
    margin-bottom: 5px;
    display: block;
    letter-spacing: 0.2px;
  }
  .date-select, .text-input, .textarea-input {
    width: 100%;
    border: 1.5px solid var(--border-mid);
    border-radius: var(--radius-sm);
    padding: 10px 10px;
    font-size: 14px;
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--surface);
    color: var(--text-primary);
    appearance: none;
    -webkit-appearance: none;
    transition: border-color 0.15s;
    touch-action: manipulation;
    outline: none;
  }
  .date-select:focus, .text-input:focus, .textarea-input:focus {
    border-color: var(--navy-light);
    background: white;
  }
  .date-select { cursor: pointer; text-align: center; }
  .textarea-input { resize: none; height: 88px; line-height: 1.6; }

  .field-group { display: flex; flex-direction: column; }

  /* Add button */
  .add-entry-btn {
    background: none;
    border: 1.5px dashed var(--border-mid);
    border-radius: var(--radius-lg);
    padding: 16px;
    cursor: pointer;
    font-size: 14px;
    color: var(--text-secondary);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    font-family: inherit;
    transition: all 0.15s;
  }
  .add-entry-btn:active { border-color: var(--navy-light); color: var(--navy-light); background: var(--navy-pale); }
  .add-plus {
    width: 26px; height: 26px;
    border-radius: 50%;
    background: var(--surface);
    border: 1.5px solid var(--border-mid);
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; font-weight: 300;
    color: var(--text-secondary);
  }

  /* Form footer */
  .form-footer {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 430px;
    background: rgba(255,255,255,0.97);
    border-top: 1px solid var(--border);
    padding: 12px 16px 32px;
    z-index: 10;
  }
  .submit-btn {
    width: 100%;
    background: var(--navy);
    color: white;
    border: none;
    border-radius: var(--radius-md);
    padding: 16px;
    font-size: 15px;
    font-weight: 700;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: all 0.15s;
    letter-spacing: -0.3px;
  }
  .submit-btn.green { background: var(--green); }
  .submit-btn:active { transform: scale(0.98); opacity: 0.9; }
  .submit-count {
    background: rgba(255,255,255,0.2);
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 12px;
    font-weight: 500;
  }

  /* ── TOAST ── */
  .toast {
    position: fixed;
    bottom: 90px; left: 50%;
    transform: translateX(-50%) translateY(10px);
    background: #0D1B2A;
    color: white;
    padding: 11px 22px;
    border-radius: 30px;
    font-size: 13px;
    font-weight: 400;
    opacity: 0;
    transition: all 0.25s ease;
    pointer-events: none;
    z-index: 100;
    white-space: nowrap;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  }
  .toast.visible {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }


  /* ── HAMBURGER BTN ── */
  .hamburger-btn {
    width: 36px; height: 36px;
    background: rgba(255,255,255,0.12);
    border: none; border-radius: 10px;
    cursor: pointer;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 5px; padding: 0; flex-shrink: 0;
    transition: background 0.15s;
  }
  .hamburger-btn:active { background: rgba(255,255,255,0.22); }
  .hamburger-btn span {
    display: block; width: 18px; height: 2px;
    background: rgba(255,255,255,0.9); border-radius: 2px;
    transition: all 0.25s;
  }

  /* ── DRAWER OVERLAY ── */
  .drawer-backdrop {
    position: fixed; inset: 0;
    background: rgba(13,27,42,0.55);
    z-index: 500;
    opacity: 0; pointer-events: none;
    transition: opacity 0.3s;
  }
  .drawer-backdrop.open { opacity: 1; pointer-events: all; }

  /* ── DRAWER PANEL ── */
  .drawer {
    position: fixed;
    top: 0; left: 0; bottom: 0;
    width: 280px;
    background: var(--navy);
    z-index: 510;
    transform: translateX(-100%);
    transition: transform 0.3s cubic-bezier(0.32,0.72,0,1);
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .drawer.open { transform: translateX(0); }

  .drawer-top {
    padding: 60px 20px 24px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    position: relative;
  }
  .drawer-close {
    position: absolute; top: 20px; right: 16px;
    width: 32px; height: 32px;
    background: rgba(255,255,255,0.08);
    border: none; border-radius: 8px;
    color: rgba(255,255,255,0.7); font-size: 16px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
  }
  .drawer-app-name {
    font-size: 18px; font-weight: 700; color: #fff;
    letter-spacing: -0.4px;
  }
  .drawer-app-sub {
    font-size: 12px; color: rgba(255,255,255,0.45);
    margin-top: 4px;
  }

  .drawer-nav { flex: 1; padding: 16px 0; overflow-y: auto; }
  .drawer-section-label {
    font-size: 10px; font-weight: 700;
    color: rgba(255,255,255,0.3);
    letter-spacing: 1px; text-transform: uppercase;
    padding: 8px 20px 4px;
  }
  .drawer-item {
    display: flex; align-items: center; gap: 14px;
    padding: 13px 20px;
    cursor: pointer; border: none; background: none;
    width: 100%; text-align: left; font-family: inherit;
    transition: background 0.12s; border-radius: 0;
    position: relative;
  }
  .drawer-item:active { background: rgba(255,255,255,0.06); }
  .drawer-item.active { background: rgba(255,255,255,0.1); }
  .drawer-item.active::before {
    content: '';
    position: absolute; left: 0; top: 8px; bottom: 8px;
    width: 3px; background: #00C7A9;
    border-radius: 0 3px 3px 0;
  }
  .drawer-item-icon {
    width: 36px; height: 36px; border-radius: 9px;

    font-size: 16px; flex-shrink: 0;
    background: rgba(255,255,255,0.08);
  }
  .drawer-item.active .drawer-item-icon { background: rgba(78,158,223,0.2); }

  .drawer-item-title {

  .drawer-divider {

  }
  .drawer-bottom {
    padding: 16px 20px 36px;
    border-top: 1px solid rgba(255,255,255,0.07);
  }
  .drawer-version { font-size: 11px; color: rgba(255,255,255,0.2); }

  /* ── RECORDS SCREEN ── */
  #screen-records { background: var(--surface); flex-direction: column; }
  .records-header {
    background: var(--navy);
    padding: 52px 16px 0;
    flex-shrink: 0;
  }
  .records-header-top {
    display: flex; align-items: center; gap: 10px; margin-bottom: 14px;
  }
  .records-header-top h2 {

  /* Period selector */
  .period-bar { padding: 0 0 14px; }
  .period-row {
    display: flex; align-items: center; gap: 5px; margin-bottom: 8px;
  }
  .period-group {
    flex: 1; display: flex; align-items: center;

  }
  .period-group-label {

  }
  .period-select {
    flex: 1; min-width: 0; background: none; border: none;
    border-left: 1px solid rgba(255,255,255,0.1);

    font-family: inherit; padding: 9px 2px;
    cursor: pointer; appearance: none; -webkit-appearance: none; text-align: center;

  .period-select option { background: #007A6E; color: white; }
  .period-range-arrow {
    color: rgba(255,255,255,0.3); font-size: 13px; flex-shrink: 0;
  }
  .period-actions {
    display: flex; gap: 5px;
  }
  .period-quick-btn {
    flex: 1; background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.14);
    border-radius: var(--radius-sm);
    color: rgba(255,255,255,0.65); font-size: 11px; font-weight: 500;
    font-family: inherit; padding: 7px 0;
    cursor: pointer; text-align: center; transition: all 0.12s;
  }
  .period-quick-btn:active,
  .period-quick-btn.active-quick {
    background: rgba(255,255,255,0.18); color: white; border-color: rgba(255,255,255,0.35);
  }
  .period-search-btn {
    background: white; border: none; border-radius: var(--radius-sm);
    color: var(--navy); font-size: 13px; font-weight: 700;
    font-family: inherit; padding: 7px 14px;
    cursor: pointer; white-space: nowrap; flex-shrink: 0; transition: opacity 0.12s;
  }
  .period-search-btn:active { opacity: 0.8; }

  /* Filter + Excel row */
  .filter-action-row {
    display: flex; align-items: center;
    padding: 10px 16px 12px; gap: 8px;
    background: var(--card);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .filter-chips-wrap { display: flex; gap: 6px; flex: 1; overflow-x: auto; scrollbar-width: none; }
  .filter-chips-wrap::-webkit-scrollbar { display: none; }
  .filter-chip {
    flex-shrink: 0; padding: 5px 12px; border-radius: 20px;
    font-size: 12px; font-weight: 500;
    border: 1px solid var(--border-mid);
    background: var(--surface); color: var(--text-secondary);
    cursor: pointer; transition: all 0.15s; font-family: inherit;
  }
  .filter-chip.active { background: var(--navy); color: white; border-color: var(--navy); }
  .filter-chip.schedule-chip.active { background: var(--navy-light); border-color: var(--navy-light); }
  .filter-chip.plan-chip.active { background: var(--green); border-color: var(--green); }

  .excel-btn {
    flex-shrink: 0;
    display: flex; align-items: center; gap: 5px;
    padding: 6px 12px; border-radius: var(--radius-sm);
    background: #00897B; color: white;
    border: none; font-size: 12px; font-weight: 700;
    font-family: inherit; cursor: pointer;
    transition: opacity 0.12s; white-space: nowrap;
  }
  .excel-btn:active { opacity: 0.8; }

  /* Summary bar */
  .records-summary {
    padding: 8px 16px 4px;
    font-size: 12px; color: var(--text-hint);
    flex-shrink: 0;
  }
  .records-summary strong { color: var(--navy-light); font-weight: 700; }
  .records-summary .sum-sched { color: var(--navy-light); font-weight: 700; }
  .records-summary .sum-plan  { color: var(--green); font-weight: 700; }

  .records-body {
    flex: 1; overflow-y: auto;
    padding: 8px 16px 40px;
  }
  .records-date-group { margin-bottom: 14px; }
  .records-date-header {
    display: flex; align-items: center; gap: 8px;
    padding: 0 2px 8px;
  }
  .records-date-title {
    font-size: 12px; font-weight: 700; color: var(--text-secondary);
  }
  .records-date-count {
    font-size: 11px; color: var(--text-hint);
    background: var(--surface); border: 1px solid var(--border);
    padding: 1px 7px; border-radius: 10px;
  }
  .record-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius-md); padding: 12px 14px;
    margin-bottom: 6px; cursor: pointer; transition: all 0.15s;
    display: flex; align-items: flex-start; gap: 10px;
  }
  .record-card:active { transform: scale(0.99); background: var(--surface); }
  .record-type-dot {
    width: 8px; height: 8px; border-radius: 50%;
    flex-shrink: 0; margin-top: 5px;
  }
  .record-type-dot.schedule { background: var(--navy-light); }
  .record-type-dot.plan { background: var(--green); }
  .record-card-info { flex: 1; min-width: 0; }
  .record-location {
    font-size: 14px; font-weight: 700; color: var(--text-primary);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .record-meta { font-size: 12px; color: var(--text-secondary); margin-top: 3px; }
  .record-content-preview {
    font-size: 12px; color: var(--text-hint); margin-top: 4px;
    display: -webkit-box; -webkit-line-clamp: 1; line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden;
  }
  .record-badge {
    font-size: 10px; font-weight: 600;
    padding: 3px 8px; border-radius: 10px; flex-shrink: 0;
  }
  .record-badge.schedule { background: var(--navy-pale); color: var(--navy-light); }
  .record-badge.plan { background: var(--green-pale); color: var(--green); }
  .records-empty {
    text-align: center; padding: 60px 20px; color: var(--text-hint); font-size: 14px;
  }
  .records-empty-icon { font-size: 40px; margin-bottom: 12px; }

  /* ── DETAIL MODAL ── */
  .detail-overlay {
    position: fixed; inset: 0;
    background: rgba(13,27,42,0.65); z-index: 300;
    opacity: 0; pointer-events: none; transition: opacity 0.25s;
    display: flex; align-items: flex-end; justify-content: center;
  }
  .detail-overlay.visible { opacity: 1; pointer-events: all; }
  .detail-sheet {
    background: var(--card); border-radius: 24px 24px 0 0;
    width: 100%; max-width: 430px; max-height: 85vh; overflow-y: auto;
    transform: translateY(100%);
    transition: transform 0.3s cubic-bezier(0.32,0.72,0,1);
    padding-bottom: 32px;
  }
  .detail-overlay.visible .detail-sheet { transform: translateY(0); }
  .detail-handle {
    width: 36px; height: 4px; background: var(--border-mid);
    border-radius: 2px; margin: 12px auto 0;
  }
  .detail-header {
    padding: 14px 18px 12px;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }
  .detail-type-badge {
    font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 20px;
  }
  .detail-type-badge.schedule { background: var(--navy-pale); color: var(--navy-light); }
  .detail-type-badge.plan { background: var(--green-pale); color: var(--green); }
  .detail-delete-btn {
    background: none; border: 1px solid var(--border);
    border-radius: 8px; padding: 5px 12px;
    font-size: 12px; color: var(--red); cursor: pointer; font-family: inherit;
  }
  .detail-body { padding: 16px 18px 8px; }
  .detail-location {
    font-size: 20px; font-weight: 700; color: var(--text-primary);
    margin-bottom: 4px; letter-spacing: -0.4px;
  }
  .detail-date { font-size: 13px; color: var(--navy-light); font-weight: 500; margin-bottom: 16px; }
  .detail-row {
    padding: 12px 0; border-top: 1px solid var(--border);
    display: flex; flex-direction: column; gap: 4px;
  }
  .detail-row-label {
    font-size: 11px; font-weight: 700; color: var(--text-hint);
    letter-spacing: 0.4px; text-transform: uppercase;
  }
  .detail-row-value { font-size: 14px; color: var(--text-primary); line-height: 1.6; white-space: pre-wrap; }
  .detail-row-value.empty { color: var(--text-hint); font-style: italic; }

  /* ── DELETE CONFIRM ── */
  .confirm-overlay {
    position: fixed; inset: 0;
    background: rgba(13,27,42,0.7); z-index: 400;
    opacity: 0; pointer-events: none; transition: opacity 0.2s;
    display: flex; align-items: center; justify-content: center;
  }
  .confirm-overlay.visible { opacity: 1; pointer-events: all; }
  .confirm-card {
    background: white; border-radius: var(--radius-xl);
    padding: 28px 24px 20px; max-width: 300px; width: 88%; text-align: center;
    transform: scale(0.9); transition: transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
  }
  .confirm-overlay.visible .confirm-card { transform: scale(1); }
  .confirm-icon { font-size: 36px; margin-bottom: 10px; }
  .confirm-title { font-size: 16px; font-weight: 700; color: var(--text-primary); }
  .confirm-sub { font-size: 13px; color: var(--text-secondary); margin-top: 6px; line-height: 1.5; }
  .confirm-btns { display: flex; gap: 8px; margin-top: 20px; }
  .confirm-btn {
    flex: 1; padding: 12px; border-radius: var(--radius-md);
    font-size: 14px; font-weight: 700; font-family: inherit;
    cursor: pointer; border: none; transition: opacity 0.12s;
  }
  .confirm-btn.cancel { background: var(--surface); color: var(--text-secondary); }
  .confirm-btn.danger { background: var(--red); color: white; }
  .confirm-btn:active { opacity: 0.85; }

  /* ── SUCCESS OVERLAY ── */
  .success-overlay {
    position: fixed;
    inset: 0;
    background: rgba(13,27,42,0.7);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 200;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }
  .success-overlay.visible { opacity: 1; pointer-events: all; }
  .success-card {
    background: white;
    border-radius: var(--radius-xl);
    padding: 36px 32px;
    text-align: center;
    max-width: 280px;
    width: 90%;
    animation: popIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  @keyframes popIn {
    from { transform: scale(0.7); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }
  .success-icon { font-size: 52px; margin-bottom: 12px; }
  .success-title { font-size: 18px; font-weight: 700; color: var(--text-primary); }
  .success-sub { font-size: 13px; color: var(--text-secondary); margin-top: 6px; line-height: 1.5; }
  .success-hint {
    font-size: 12px; color: var(--text-hint);
    margin-top: 10px; line-height: 1.6;
    background: var(--surface);
    border-radius: var(--radius-sm);
    padding: 8px 12px;
  }
  .success-close-btn {
    margin-top: 24px;
    width: 100%;
    background: var(--navy);
    color: white;
    border: none;
    border-radius: var(--radius-md);
    padding: 13px;
    font-size: 14px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
  }

  /* ── LOGIN SCREEN ── */
  #screen-login {
    background: var(--navy);
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }
  .login-wrap {
    width: 100%;
    padding: 40px 28px;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
  }
  .login-logo { font-size: 52px; margin-bottom: 16px; }
  .login-title { font-size: 24px; font-weight: 700; color: white; letter-spacing: -0.5px; margin-bottom: 6px; }
  .login-sub { font-size: 14px; color: rgba(255,255,255,0.45); margin-bottom: 36px; }
  .login-card {
    background: white;
    border-radius: var(--radius-xl);
    padding: 28px 24px 24px;
    width: 100%;
    max-width: 340px;
    text-align: left;
  }
  .login-label {
    font-size: 12px; font-weight: 700; color: var(--text-secondary);
    letter-spacing: 0.5px; display: block; margin-bottom: 8px; text-transform: uppercase;
  }
  .login-input {
    width: 100%;
    border: 1.5px solid var(--border-mid);
    border-radius: var(--radius-sm);
    padding: 13px 14px;
    font-size: 16px;
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--surface);
    color: var(--text-primary);
    letter-spacing: 2px;
    outline: none;
    transition: border-color 0.15s;
    text-transform: uppercase;
  }
  .login-input:focus { border-color: var(--navy-light); background: white; }
  .login-error { font-size: 12px; color: var(--red); margin-top: 8px; min-height: 16px; }
  .login-btn {
    width: 100%; background: var(--navy); color: white;
    border: none; border-radius: var(--radius-md);
    padding: 15px; font-size: 15px; font-weight: 700;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer; margin-top: 20px; letter-spacing: -0.3px;
    transition: opacity 0.15s;
  }
  .login-btn:active { opacity: 0.85; }

  /* ── DRAWER USER/LOGOUT ── */
  .drawer-user-row {
    display: flex; align-items: center; gap: 8px;
    color: rgba(255,255,255,0.75); font-size: 13px; font-weight: 600;
    margin-bottom: 10px;
  }
  .drawer-logout-btn {
    width: 100%; padding: 10px; border-radius: var(--radius-sm);
    background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12);
    color: rgba(255,255,255,0.6); font-size: 13px;
    font-family: inherit; cursor: pointer; margin-bottom: 10px;
    transition: background 0.12s;
  }
  .drawer-logout-btn:active { background: rgba(255,255,255,0.16); }

  /* ── ADMIN MODE ── */
  .admin-mode .main-actions { display: none; }
  .admin-mode .detail-delete-btn { display: none; }
  #drawer-reg-divider.hidden, #drawer-reg-section.hidden,
  #drawer-form-schedule.hidden, #drawer-form-plan.hidden { display: none; }
  .record-user-info {
    font-size: 11px; color: var(--amber); font-weight: 600; margin-top: 2px;
  }
  .admin-badge {
    background: var(--amber-pale); color: var(--amber);
    font-size: 10px; font-weight: 700; padding: 3px 9px; border-radius: 20px;
    margin-left: 6px; vertical-align: middle;
  }
</style>
</head>
<body>
<div class="app" id="app">

  <!-- ═══════════════════════════════ LOGIN SCREEN ═══════════════════════════════ -->
  <div class="screen active" id="screen-login">
    <div class="login-wrap">
      <div class="login-logo">📋</div>
      <div class="login-title">BM 영업일지</div>
      <div class="login-sub">사번을 입력하여 시작하세요</div>
      <div class="login-card">
        <label class="login-label">사번 / 아이디</label>
        <input type="text" class="login-input" id="login-input" placeholder="예) A0000000"
          maxlength="20" onkeydown="if(event.key==='Enter')doLogin()" oninput="onLoginInput()" autocomplete="off" />
        <div id="login-pw-wrap" style="display:none; margin-top:14px;">
          <label class="login-label">비밀번호</label>
          <input type="password" class="login-input" id="login-pw" style="letter-spacing:normal; text-transform:none;"
            placeholder="비밀번호 입력" maxlength="30"
            onkeydown="if(event.key==='Enter')doLogin()" autocomplete="off" />
        </div>
        <div class="login-error" id="login-error"></div>
        <button class="login-btn" onclick="doLogin()">시작하기</button>
      </div>
    </div>
  </div>

  <!-- ═══════════════════════════════ MAIN SCREEN ═══════════════════════════════ -->
  <div class="screen" id="screen-main">
    <div class="app-header">
      <div class="header-top">
        <button class="hamburger-btn" onclick="openDrawer()" aria-label="메뉴">
          <span></span><span></span><span></span>
        </button>
        <span class="header-date" id="today-str"></span>
      </div>
      <div class="header-title" id="greeting-title">오늘도 수고하세요</div>
      <div class="header-sub">활동 내역을 기록해 주세요</div>
    </div>

    <div class="main-content">
      <!-- Calendar -->
      <div class="cal-card">
        <div class="cal-header">
          <button class="cal-nav-btn" onclick="changeMonth(-1)">‹</button>
          <span class="cal-title" id="cal-month-title"></span>
          <button class="cal-nav-btn" onclick="changeMonth(1)">›</button>
        </div>
        <div class="cal-body">
          <div class="cal-weekdays">
            <span>일</span><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span>토</span>
          </div>
          <div class="cal-grid" id="cal-grid"></div>
        </div>
      </div>

      <!-- Stats -->
      <div class="stats-row">
        <div class="stat-card schedule-stat">
          <div class="stat-icon">📝</div>
          <div>
            <div class="stat-num" id="stat-schedule">0</div>
            <div class="stat-label">이번 달 일정</div>
          </div>
        </div>
        <div class="stat-card plan-stat">
          <div class="stat-icon">📅</div>
          <div>
            <div class="stat-num" id="stat-plan">0</div>
            <div class="stat-label">이번 달 계획</div>
          </div>
        </div>
      </div>

      <!-- Action buttons -->
      <div class="main-actions">
        <button class="action-btn btn-schedule" onclick="openForm('schedule')">
          <div class="action-icon">📝</div>
          <div>
            <div class="action-btn-title">일정등록</div>
            <div class="action-btn-desc">방문 활동과<br>대화 내용 기록</div>
          </div>
        </button>
        <button class="action-btn btn-plan" onclick="openForm('plan')">
          <div class="action-icon">📅</div>
          <div>
            <div class="action-btn-title">계획등록</div>
            <div class="action-btn-desc">향후 방문<br>계획 입력</div>
          </div>
        </button>
      </div>

      <!-- Recent entries -->
      <div class="section-header">
        <span class="section-title">최근 기록</span>
      </div>
      <div class="recent-list" id="recent-list">
        <div class="empty-state">아직 기록된 내용이 없습니다</div>
      </div>
    </div>
  </div>

  <!-- ═══════════════════════════════ SCHEDULE SCREEN ═══════════════════════════════ -->
  <div class="screen" id="screen-schedule">
    <div class="form-header">
      <button class="back-btn" onclick="goBack()">←</button>
      <div class="form-header-info">
        <div class="form-header-title">일정등록</div>
        <div class="form-header-sub">방문 활동을 기록하세요</div>
      </div>
    </div>
    <div class="form-body" id="schedule-body"></div>
    <div class="form-footer">
      <button class="submit-btn" id="schedule-submit" onclick="submitForm('schedule')">
        <span>💾</span> 등록하기 <span class="submit-count" id="schedule-count">1건</span>
      </button>
    </div>
  </div>

  <!-- ═══════════════════════════════ PLAN SCREEN ═══════════════════════════════ -->
  <div class="screen" id="screen-plan">
    <div class="form-header">
      <button class="back-btn" onclick="goBack()">←</button>
      <div class="form-header-info">
        <div class="form-header-title">계획등록</div>
        <div class="form-header-sub">방문 계획을 입력하세요</div>
      </div>
    </div>
    <div class="form-body" id="plan-body"></div>
    <div class="form-footer">
      <button class="submit-btn green" id="plan-submit" onclick="submitForm('plan')">
        <span>💾</span> 등록하기 <span class="submit-count" id="plan-count">1건</span>
      </button>
    </div>
  </div>


  <!-- ── DRAWER ── -->
  <div class="drawer-backdrop" id="drawer-backdrop" onclick="closeDrawer()"></div>
  <div class="drawer" id="drawer">

<script>
// ── STATE ──
const today = new Date();
let calYear = today.getFullYear();
let calMonth = today.getMonth();
let scheduleEntryCount = 0;
let planEntryCount = 0;
let selectedDate = null;
let currentTab = 'home';
let currentFilter = 'all';
let detailEntryIndex = null;

const KEY = 'bm_entries_v1';
let allEntries = [];

// ── AUTH ──
const ALLOWED_USERS = { 'A2993178': '한종호', 'A2993128': '전창식', 'A2993282': '신용태', 'A2993171': '이재규', 'A3993063': '원미정', 'A3993252': '신재영' };
const ADMIN_ID = 'JONGHO';
const ADMIN_PW = 'jongho1234';
let currentUser = null;
function isAdmin() { return currentUser && currentUser.id === ADMIN_ID; }

// ── SERVER SYNC ──
async function loadFromServer() {
  try {
    const res = await fetch('/api/entries');
    if (res.ok) {
      const all = await res.json();
      if (isAdmin()) {
        allEntries = all;
      } else {
        allEntries = all.filter(function(e) { return e.userId === currentUser.id; });
        localStorage.setItem(KEY, JSON.stringify(allEntries));
      }
      return;
    }
  } catch (e) {}
  if (isAdmin()) {
    allEntries = [];
  } else {
    allEntries = JSON.parse(localStorage.getItem(KEY) || '[]');
  }
}

async function syncToServer() {
  if (isAdmin()) return; // 관리자는 서버 데이터를 직접 수정하지 않음
  try {
    const res = await fetch('/api/entries');
    let allUsersEntries = [];
    if (res.ok) allUsersEntries = await res.json();
    const others = allUsersEntries.filter(function(e) { return e.userId !== currentUser.id; });
    const merged = others.concat(allEntries);
    await fetch('/api/entries', {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(merged)
    });
  } catch (e) {}
  localStorage.setItem(KEY, JSON.stringify(allEntries));
}

// ── INIT ──
async function init() {
  // 자동 로그인 비활성화: 항상 로그인 화면에서 시작
  localStorage.removeItem('bm_user');
}

function initMainScreen() {
  document.querySelectorAll('.screen').forEach(function(s){ s.classList.remove('active'); });
  const app = document.getElementById('app');
  const regIds = ['drawer-reg-divider','drawer-reg-section','drawer-form-schedule','drawer-form-plan'];
  if (isAdmin()) {
    app.classList.add('admin-mode');
    regIds.forEach(function(id){ const el = document.getElementById(id); if (el) el.classList.add('hidden'); });
    document.getElementById('screen-records').classList.add('active');
    currentTab = 'records';
    document.getElementById('drawer-records').classList.add('active');
    document.getElementById('drawer-home').classList.remove('active');
  } else {
    app.classList.remove('admin-mode');
    regIds.forEach(function(id){ const el = document.getElementById(id); if (el) el.classList.remove('hidden'); });
    document.getElementById('screen-main').classList.add('active');
    currentTab = 'home';
    document.getElementById('drawer-home').classList.add('active');
    document.getElementById('drawer-records').classList.remove('active');
  }
  const days = ['일','월','화','수','목','금','토'];
  const d = today;
  document.getElementById('today-str').textContent =
    d.getFullYear() + '.' + String(d.getMonth()+1).padStart(2,'0') + '.' + String(d.getDate()).padStart(2,'0') + ' ' + days[d.getDay()];
  updateUserUI();
  renderCalendar();
  renderStats();
  renderRecent();
  initPeriodSelectors();
  if (isAdmin()) renderRecords();
}

function updateUserUI() {
  if (!currentUser) return;
  const hour = today.getHours();
  const greeting = hour < 12 ? '좋은 아침입니다' : hour < 18 ? '오늘도 수고하세요' : '오늘 하루도 고생하셨습니다';
  document.getElementById('greeting-title').textContent = currentUser.name + '님, ' + greeting;
  const el = document.getElementById('drawer-username');
  if (el) el.textContent = isAdmin() ? '관리자' : currentUser.name;
}

function onLoginInput() {
  const val = document.getElementById('login-input').value.trim().toUpperCase();
  const pwWrap = document.getElementById('login-pw-wrap');
  if (val === ADMIN_ID) {
    pwWrap.style.display = 'block';
  } else {
    pwWrap.style.display = 'none';
    document.getElementById('login-pw').value = '';
  }
}

function doLogin() {
  const input = document.getElementById('login-input');
  const errEl = document.getElementById('login-error');
  const id = input.value.trim().toUpperCase();
  errEl.textContent = '';
  if (!id) { errEl.textContent = '사번을 입력해주세요'; return; }
  if (id === ADMIN_ID) {
    const pw = document.getElementById('login-pw').value;
    if (!pw) { errEl.textContent = '비밀번호를 입력해주세요'; return; }
    if (pw !== ADMIN_PW) { errEl.textContent = '비밀번호가 올바르지 않습니다'; document.getElementById('login-pw').select(); return; }
    currentUser = { id: ADMIN_ID, name: '관리자' };
    localStorage.setItem('bm_user', JSON.stringify(currentUser));
    loadFromServer().then(function() { initMainScreen(); });
    return;
  }
  if (!ALLOWED_USERS[id]) { errEl.textContent = '등록되지 않은 사번입니다'; input.select(); return; }
  currentUser = { id: id, name: ALLOWED_USERS[id] };
  localStorage.setItem('bm_user', JSON.stringify(currentUser));
  loadFromServer().then(function() { initMainScreen(); });
}

function logout() {
  localStorage.removeItem('bm_user');
  currentUser = null;
  allEntries = [];
  closeDrawer();
  document.getElementById('app').classList.remove('admin-mode');
  document.querySelectorAll('.screen').forEach(function(s){ s.classList.remove('active'); });
  document.getElementById('screen-login').classList.add('active');
  document.getElementById('login-input').value = '';
  document.getElementById('login-error').textContent = '';
  document.getElementById('login-pw').value = '';
  document.getElementById('login-pw-wrap').style.display = 'none';
}

// ── CALENDAR ──
function renderCalendar() {
  const names = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  document.getElementById('cal-month-title').textContent = calYear + '년 ' + names[calMonth];
  const grid = document.getElementById('cal-grid');
  grid.innerHTML = '';
  const firstDay = new Date(calYear, calMonth, 1).getDay();
  const lastDate = new Date(calYear, calMonth + 1, 0).getDate();
  const prevLast = new Date(calYear, calMonth, 0).getDate();
  for (let i = firstDay - 1; i >= 0; i--) {
    const el = document.createElement('div');
    el.className = 'cal-day other-month';
    el.textContent = prevLast - i;
    grid.appendChild(el);
  }
  for (let day = 1; day <= lastDate; day++) {
    const el = document.createElement('div');
    el.className = 'cal-day';
    el.textContent = day;
    const dateStr = calYear + '-' + String(calMonth+1).padStart(2,'0') + '-' + String(day).padStart(2,'0');
    const dayEntries = allEntries.filter(function(e){ return e.date === dateStr; });
    if (dayEntries.some(function(e){ return e.type === 'schedule'; })) el.classList.add('has-schedule');
    if (dayEntries.some(function(e){ return e.type === 'plan'; })) el.classList.add('has-plan');
    if (calYear === today.getFullYear() && calMonth === today.getMonth() && day === today.getDate()) el.classList.add('today');
    (function(y, m, dd, elem) {
      elem.addEventListener('click', function() { openSheet(y, m, dd, elem); });
    })(calYear, calMonth + 1, day, el);
    grid.appendChild(el);
  }
  const total = firstDay + lastDate;
  const remain = total % 7 === 0 ? 0 : 7 - (total % 7);
  for (let i = 1; i <= remain; i++) {
    const el = document.createElement('div');
    el.className = 'cal-day other-month';
    el.textContent = i;
    grid.appendChild(el);
  }
}

function changeMonth(dir) {
  calMonth += dir;
  if (calMonth < 0) { calMonth = 11; calYear--; }
  if (calMonth > 11) { calMonth = 0; calYear++; }
  renderCalendar();
  renderStats();
}

function renderStats() {
  const scheds = allEntries.filter(function(e){ return e.type === 'schedule' && new Date(e.date).getMonth() === calMonth && new Date(e.date).getFullYear() === calYear; });
  const plans  = allEntries.filter(function(e){ return e.type === 'plan'     && new Date(e.date).getMonth() === calMonth && new Date(e.date).getFullYear() === calYear; });
  document.getElementById('stat-schedule').textContent = scheds.length;
  document.getElementById('stat-plan').textContent     = plans.length;
}

function renderRecent() {
  const list = document.getElementById('recent-list');
  const recent = allEntries.slice().reverse().slice(0, 6);
  if (recent.length === 0) {
    list.innerHTML = '<div class="empty-state">아직 기록된 내용이 없습니다</div>';
    return;
  }
  list.innerHTML = recent.map(function(e) {
    const typeLabel = e.type === 'schedule' ? '일정' : '계획';
    const meta = e.type === 'schedule' ? e.date + (e.seller ? ' · ' + e.seller : '') : e.date;
    return '<div class="recent-item">' +
      '<div class="recent-dot ' + e.type + '"></div>' +
      '<div class="recent-info"><div class="recent-location">' + esc(e.location) + '</div>' +
      '<div class="recent-meta">' + esc(meta) + '</div></div>' +
      '<span class="recent-type ' + e.type + '">' + typeLabel + '</span></div>';
  }).join('');
}

// ── BOTTOM SHEET ──
function openSheet(year, month, day, el) {
  selectedDate = { year: year, month: month, day: day };
  document.querySelectorAll('.cal-day.selected').forEach(function(e){ e.classList.remove('selected'); });
  if (el) el.classList.add('selected');
  const dayNames = ['일','월','화','수','목','금','토'];
  const dow = new Date(year, month - 1, day).getDay();
  document.getElementById('sheet-date-label').textContent = year + '년 ' + month + '월 ' + day + '일 (' + dayNames[dow] + ')';
  document.getElementById('sheet-backdrop').classList.add('visible');
  document.getElementById('bottom-sheet').classList.add('visible');
}
function closeSheet() {
  document.getElementById('sheet-backdrop').classList.remove('visible');
  document.getElementById('bottom-sheet').classList.remove('visible');
  document.querySelectorAll('.cal-day.selected').forEach(function(e){ e.classList.remove('selected'); });
}
function openFormFromSheet(type) {
  closeSheet();
  openForm(type, selectedDate);
}

// ── DRAWER ──
function openDrawer() {
  document.getElementById('drawer').classList.add('open');
  document.getElementById('drawer-backdrop').classList.add('open');
}
function closeDrawer() {
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('drawer-backdrop').classList.remove('open');
}
function drawerNav(tab) {
  closeDrawer();
  currentTab = tab;
  ['home','records'].forEach(function(id) {
    const el = document.getElementById('drawer-' + id);
    if (el) el.classList.toggle('active', id === tab);
  });
  ['screen-main','screen-records','screen-schedule','screen-plan'].forEach(function(id) {
    const el = document.getElementById(id);
    if (el) el.classList.remove('active');
  });
  if (tab === 'home') {
    document.getElementById('screen-main').classList.add('active');
  } else if (tab === 'records') {
    document.getElementById('screen-records').classList.add('active');
    renderRecords();
  }
}
function drawerOpenForm(type) { closeDrawer(); openForm(type, null); }
function switchTab(tab) { drawerNav(tab); }

// ── NAVIGATION ──
function openForm(type, date) {
  document.querySelectorAll('.screen').forEach(function(s){ s.classList.remove('active'); });
  document.getElementById('screen-' + type).classList.add('active');
  window.scrollTo(0, 0);
  if (type === 'schedule') {
    scheduleEntryCount = 0;
    var sb = document.getElementById('schedule-body');
    sb.innerHTML = '';
    addEntry('schedule', date);
  } else {
    planEntryCount = 0;
    var pb = document.getElementById('plan-body');
    pb.innerHTML = '';
    addEntry('plan', date);
  }
}
function goBack() {
  document.querySelectorAll('.screen').forEach(function(s){ s.classList.remove('active'); });
  window.scrollTo(0, 0);
  if (currentTab === 'records') {
    document.getElementById('screen-records').classList.add('active');
    renderRecords();
  } else {
    document.getElementById('screen-main').classList.add('active');
  }
}

// ── ENTRY MANAGEMENT ──
function makeOpts(from, to, cur, unit) {
  let o = '';
  for (let v = from; v <= to; v++) {
    o += '<option value="' + v + '"' + (v === cur ? ' selected' : '') + '>' + v + unit + '</option>';
  }
  return o;
}

function addEntry(type, date) {
  const isSchedule = type === 'schedule';
  const countId = isSchedule ? ++scheduleEntryCount : ++planEntryCount;
  const body = document.getElementById(type + '-body');
  const existBtn = body.querySelector('.add-entry-btn');
  if (existBtn) existBtn.remove();

  const py = date ? date.year  : today.getFullYear();
  const pm = date ? date.month : today.getMonth() + 1;
  const pd = date ? date.day   : today.getDate();

  const card = document.createElement('div');
  card.className = 'entry-card';
  card.id = type + '-entry-' + countId;
  const removeBtn = countId > 1
    ? '<button class="entry-remove-btn" onclick="removeEntry(\'' + type + '\',' + countId + ')">삭제</button>' : '';

  const dateFields = '<div class="field-group"><label class="field-label">날짜</label>' +
    '<div class="date-group">' +
    '<select class="date-select" data-field="year">'  + makeOpts(2023,2028,py,'년') + '</select>' +
    '<select class="date-select" data-field="month">' + makeOpts(1,12,pm,'월') + '</select>' +
    '<select class="date-select" data-field="day">'   + makeOpts(1,31,pd,'일') + '</select>' +
    '</div></div>';

  const bankField = '<div class="field-group"><label class="field-label">은행</label>' +
    '<select class="text-input" data-field="bank">' +
    '<option value="">선택 안함</option>' +
    '<option value="iM뱅크">iM뱅크</option>' +
    '<option value="KB국민">KB국민</option>' +
    '</select></div>';
  if (isSchedule) {
    card.innerHTML = '<div class="entry-card-header">' +
      '<div class="entry-card-label"><div class="entry-num-badge">' + countId + '</div>방문 기록</div>' +
      removeBtn + '</div><div class="entry-card-body">' + dateFields +
      bankField +
      '<div class="field-group"><label class="field-label">방문지점</label>' +
      '<input type="text" class="text-input" data-field="location" placeholder="예) OO 지점" /></div>' +
      '<div class="field-group"><label class="field-label">판매인</label>' +
      '<input type="text" class="text-input" data-field="seller" placeholder="예) 홍길동" /></div>' +
      '<div class="field-group"><label class="field-label">내용</label>' +
      '<textarea class="textarea-input" data-field="content" placeholder="오늘의 대화 내용, 주요 사항 등을 입력하세요"></textarea></div></div>';
  } else {
    card.innerHTML = '<div class="entry-card-header">' +
      '<div class="entry-card-label"><div class="entry-num-badge">' + countId + '</div>방문 계획</div>' +
      removeBtn + '</div><div class="entry-card-body">' + dateFields +
      bankField +
      '<div class="field-group"><label class="field-label">방문지점</label>' +
      '<input type="text" class="text-input" data-field="location" placeholder="예) OO 지점" /></div></div>';
  }
  body.appendChild(card);

  const addBtn = document.createElement('button');
  addBtn.className = 'add-entry-btn';
  addBtn.innerHTML = '<div class="add-plus">+</div> 항목 추가';
  addBtn.onclick = function() { addEntry(type, null); };
  body.appendChild(addBtn);
  updateCount(type);

  // 항목 추가 시 새 카드로 page 스크롤
  setTimeout(function() { window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' }); }, 50);
}

function removeEntry(type, id) {
  const el = document.getElementById(type + '-entry-' + id);
  if (el) el.remove();
  updateCount(type);
}
function updateCount(type) {
  const cards = document.getElementById(type + '-body').querySelectorAll('.entry-card');
  document.getElementById(type + '-count').textContent = cards.length + '건';
}

// ── SUBMIT ──
async function submitForm(type) {
  const body = document.getElementById(type + '-body');
  const cards = body.querySelectorAll('.entry-card');
  const entries = [];
  let valid = true;
  cards.forEach(function(card) {
    const year  = card.querySelector('[data-field="year"]').value;
    const month = card.querySelector('[data-field="month"]').value;
    const day   = card.querySelector('[data-field="day"]').value;
    const dateVal = year + '-' + String(month).padStart(2,'0') + '-' + String(day).padStart(2,'0');
    const location = (card.querySelector('[data-field="location"]').value || '').trim();
    if (!location) { valid = false; card.querySelector('[data-field="location"]').focus(); return; }
    const bank = card.querySelector('[data-field="bank"]').value || '';
    const entry = { type: type, date: dateVal, location: location, bank: bank, userId: currentUser.id, createdAt: new Date().toISOString() };
    if (type === 'schedule') {
      entry.seller  = (card.querySelector('[data-field="seller"]').value || '').trim();
      entry.content = (card.querySelector('[data-field="content"]').value || '').trim();
    }
    entries.push(entry);
  });
  if (!valid) { showToast('⚠️ 방문지점을 입력해주세요'); return; }
  if (entries.length === 0) { showToast('⚠️ 항목을 입력해주세요'); return; }
  allEntries.push.apply(allEntries, entries);
  localStorage.setItem(KEY, JSON.stringify(allEntries)); // 즉시 로컬 저장
  syncToServer(); // 백그라운드 서버 동기화 (await 제거)
  const typeLabel = type === 'schedule' ? '일정' : '계획';
  document.getElementById('success-icon').textContent  = type === 'schedule' ? '📝' : '📅';
  document.getElementById('success-title').textContent = typeLabel + ' 등록 완료!';
  document.getElementById('success-sub').textContent   = '총 ' + entries.length + '건이 기기에 저장되었습니다.';
  document.getElementById('success-overlay').classList.add('visible');
}
function closeSuccess() {
  document.getElementById('success-overlay').classList.remove('visible');
  goBack();
  renderCalendar(); renderStats(); renderRecent();
  if (currentTab === 'records') renderRecords();
}

// ── TOAST ──
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('visible');
  setTimeout(function(){ t.classList.remove('visible'); }, 2800);
}

// ── PERIOD SELECTORS ──
function initPeriodSelectors() {
  const curY = today.getFullYear();
  const curM = today.getMonth() + 1;
  const curD = today.getDate();

  ['period-start-year','period-end-year'].forEach(function(id) {
    const sel = document.getElementById(id);
    if (!sel) return;
    for (let y = curY - 4; y <= curY + 1; y++) {
      const o = document.createElement('option');
      o.value = y; o.textContent = y + '년';
      if (y === curY) o.selected = true;
      sel.appendChild(o);
    }
    sel.addEventListener('change', function() {
      const prefix = id.includes('start') ? 'start' : 'end';
      syncDayOpts(prefix);
    });
  });

  ['period-start-month','period-end-month'].forEach(function(id) {
    const sel = document.getElementById(id);
    if (!sel) return;
    for (let m = 1; m <= 12; m++) {
      const o = document.createElement('option');
      o.value = m; o.textContent = m + '월';
      if (m === curM) o.selected = true;
      sel.appendChild(o);
    }
    sel.addEventListener('change', function() {
      const prefix = id.includes('start') ? 'start' : 'end';
      syncDayOpts(prefix);
    });
  });

  syncDayOpts('start');
  syncDayOpts('end');

  document.getElementById('period-start-year').value  = curY;
  document.getElementById('period-start-month').value = curM;
  syncDayOpts('start');
  document.getElementById('period-start-day').value   = curD;
  document.getElementById('period-end-year').value    = curY;
  document.getElementById('period-end-month').value   = curM;
  syncDayOpts('end');
  document.getElementById('period-end-day').value     = curD;
}

function syncDayOpts(prefix) {
  const ySel   = document.getElementById('period-' + prefix + '-year');
  const mSel   = document.getElementById('period-' + prefix + '-month');
  const dSel   = document.getElementById('period-' + prefix + '-day');
  if (!ySel || !mSel || !dSel) return;
  const y = parseInt(ySel.value);
  const m = parseInt(mSel.value);
  const maxDay = new Date(y, m, 0).getDate();
  const prevDay = parseInt(dSel.value) || 1;
  dSel.innerHTML = '';
  for (let d = 1; d <= maxDay; d++) {
    const o = document.createElement('option');
    o.value = d; o.textContent = d + '일';
    if (d === Math.min(prevDay, maxDay)) o.selected = true;
    dSel.appendChild(o);
  }
}

function setQuickPeriod(btn, type) {
  const curY = today.getFullYear();
  const curM = today.getMonth() + 1;
  const curD = today.getDate();
  let sy, sm, sd, ey, em, ed;

  if (type === 'today') {
    sy = curY; sm = curM; sd = curD; ey = curY; em = curM; ed = curD;
  } else if (type === 'this-month') {
    sy = curY; sm = curM; sd = 1;   ey = curY; em = curM; ed = new Date(curY, curM, 0).getDate();
  } else if (type === 'last-month') {
    const t = new Date(curY, curM - 2, 1);
    sy = t.getFullYear(); sm = t.getMonth() + 1; sd = 1;
    ey = sy; em = sm; ed = new Date(sy, sm, 0).getDate();
  } else if (type === '3-months') {
    const t = new Date(curY, curM - 3, 1);
    sy = t.getFullYear(); sm = t.getMonth() + 1; sd = 1;
    ey = curY; em = curM; ed = new Date(curY, curM, 0).getDate();
  } else if (type === 'this-year') {
    sy = curY; sm = 1; sd = 1; ey = curY; em = 12; ed = 31;
  }

  document.getElementById('period-start-year').value  = sy;
  document.getElementById('period-start-month').value = sm;
  syncDayOpts('start');
  document.getElementById('period-start-day').value   = sd;
  document.getElementById('period-end-year').value    = ey;
  document.getElementById('period-end-month').value   = em;
  syncDayOpts('end');
  document.getElementById('period-end-day').value     = ed;

  document.querySelectorAll('.period-quick-btn').forEach(function(b){ b.classList.remove('active-quick'); });
  if (btn) btn.classList.add('active-quick');
  renderRecords();
}

// ── GET FILTERED ENTRIES ──
function getFilteredEntries() {
  const sy = parseInt(document.getElementById('period-start-year').value  || today.getFullYear());
  const sm = parseInt(document.getElementById('period-start-month').value || (today.getMonth()+1));
  const sd = parseInt(document.getElementById('period-start-day').value   || 1);
  const ey = parseInt(document.getElementById('period-end-year').value    || today.getFullYear());
  const em = parseInt(document.getElementById('period-end-month').value   || (today.getMonth()+1));
  const ed = parseInt(document.getElementById('period-end-day').value     || 31);

  const s = sy + '-' + String(sm).padStart(2,'0') + '-' + String(sd).padStart(2,'0');
  const e = ey + '-' + String(em).padStart(2,'0') + '-' + String(ed).padStart(2,'0');

  let entries = allEntries.filter(function(x){ return x.date >= s && x.date <= e; });
  if (currentFilter !== 'all') entries = entries.filter(function(x){ return x.type === currentFilter; });
  return { entries: entries, startStr: s, endStr: e, sy: sy, sm: sm, sd: sd, ey: ey, em: em, ed: ed };
}

// ── FILTER ──
function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.filter-chip').forEach(function(c){
    c.classList.toggle('active', c.dataset.filter === f);
  });
  renderRecords();
}

// ── RENDER RECORDS ──
function renderRecords() {
  const body    = document.getElementById('records-body');
  const summary = document.getElementById('records-summary');
  const result  = getFilteredEntries();
  const entries = result.entries;
  const s       = result.startStr;
  const e       = result.endStr;
  const sy = result.sy, sm = result.sm, sd = result.sd;
  const ey = result.ey, em = result.em, ed = result.ed;

  const schedCount = entries.filter(function(x){ return x.type === 'schedule'; }).length;
  const planCount  = entries.filter(function(x){ return x.type === 'plan'; }).length;

  if (summary) {
    if (entries.length === 0) {
      summary.innerHTML = '';
    } else {
      const label = s === e
        ? sy + '년 ' + sm + '월 ' + sd + '일'
        : sy + '년 ' + sm + '월 ' + sd + '일 ~ ' + ey + '년 ' + em + '월 ' + ed + '일';
      summary.innerHTML = '<strong>' + label + '</strong> &nbsp;·&nbsp; ' +
        '<span class="sum-sched">일정 ' + schedCount + '건</span> &nbsp;·&nbsp; ' +
        '<span class="sum-plan">계획 ' + planCount + '건</span> &nbsp;·&nbsp; 총 ' + entries.length + '건';
    }
  }

  if (entries.length === 0) {
    const label = s === e
      ? sy + '년 ' + sm + '월 ' + sd + '일'
      : sy + '년 ' + sm + '월 ' + sd + '일 ~ ' + ey + '년 ' + em + '월 ' + ed + '일';
    body.innerHTML = '<div class="records-empty"><div class="records-empty-icon">📭</div><div>' + label + ' 기록이 없습니다</div></div>';
    return;
  }

  const groups = {};
  entries.forEach(function(x) {
    if (!groups[x.date]) groups[x.date] = [];
    groups[x.date].push(x);
  });

  const dayNames = ['일','월','화','수','목','금','토'];
  let html = '';
  Object.keys(groups).sort().reverse().forEach(function(date) {
    const d = new Date(date + 'T00:00:00');
    const parts = date.split('-');
    const titleStr = parts[0] + '년 ' + parseInt(parts[1]) + '월 ' + parseInt(parts[2]) + '일 (' + dayNames[d.getDay()] + ')';
    const cnt = groups[date].length;
    const cards = groups[date].map(function(x) {
      const idx = allEntries.indexOf(x);
      const typeLabel = x.type === 'schedule' ? '일정' : '계획';
      const metaParts = [];
      if (x.type === 'schedule' && x.seller) metaParts.push(x.seller);
      if (x.bank) metaParts.push(x.bank);
      const meta = metaParts.join(' · ');
      const preview = (x.type === 'schedule' && x.content)
        ? '<div class="record-content-preview">' + esc(x.content) + '</div>' : '';
      const userInfo = isAdmin() && x.userId
        ? '<div class="record-user-info">👤 ' + esc(x.userId) + ' · ' + esc(ALLOWED_USERS[x.userId] || '알수없음') + '</div>' : '';
      return '<div class="record-card" onclick="openDetail(' + idx + ')">' +
        '<div class="record-type-dot ' + x.type + '"></div>' +
        '<div class="record-card-info"><div class="record-location">' + esc(x.location) + '</div>' +
        (meta ? '<div class="record-meta">' + esc(meta) + '</div>' : '') +
        userInfo + preview + '</div>' +
        '<span class="record-badge ' + x.type + '">' + typeLabel + '</span></div>';
    }).join('');
    html += '<div class="records-date-group">' +
      '<div class="records-date-header"><span class="records-date-title">' + titleStr + '</span>' +
      '<span class="records-date-count">' + cnt + '건</span></div>' + cards + '</div>';
  });
  body.innerHTML = html;
}

// ── EXCEL DOWNLOAD ──
function downloadExcel() {
  if (typeof XLSX === 'undefined') { showToast('⚠️ 라이브러리 로딩 중. 잠시 후 재시도해주세요.'); return; }
  const result  = getFilteredEntries();
  const entries = result.entries;
  const s = result.startStr, e = result.endStr;
  if (entries.length === 0) { showToast('⚠️ 다운로드할 데이터가 없습니다'); return; }

  const sorted   = entries.slice().sort(function(a,b){ return a.date.localeCompare(b.date); });
  const dayNames = ['일','월','화','수','목','금','토'];
  let wsData;
  if (isAdmin()) {
    wsData = [['사번','이름','날짜','요일','유형','은행','방문지점','판매인','내용']];
    sorted.forEach(function(x) {
      const d = new Date(x.date + 'T00:00:00');
      wsData.push([x.userId || '', ALLOWED_USERS[x.userId] || '', x.date, dayNames[d.getDay()],
        x.type === 'schedule' ? '일정' : '계획',
        x.bank || '', x.location || '', x.seller || '', x.content || '']);
    });
  } else {
    wsData = [['날짜','요일','유형','은행','방문지점','판매인','내용']];
    sorted.forEach(function(x) {
      const d = new Date(x.date + 'T00:00:00');
      wsData.push([x.date, dayNames[d.getDay()], x.type === 'schedule' ? '일정' : '계획',
        x.bank || '', x.location || '', x.seller || '', x.content || '']);
    });
  }

  const ws = XLSX.utils.aoa_to_sheet(wsData);
  if (isAdmin()) {
    ws['!cols'] = [{ wch:12 },{ wch:10 },{ wch:14 },{ wch:6 },{ wch:8 },{ wch:12 },{ wch:22 },{ wch:14 },{ wch:50 }];
  } else {
    ws['!cols'] = [{ wch:14 },{ wch:6 },{ wch:8 },{ wch:12 },{ wch:22 },{ wch:14 },{ wch:50 }];
  }
  const wb = XLSX.utils.book_new();
  const sheetLabel = s === e ? s : s + '~' + e;
  XLSX.utils.book_append_sheet(wb, ws, sheetLabel.slice(0,31));
  const nameTag = currentUser ? currentUser.name + '_' : '';
  const filename = 'BM영업일지_' + nameTag + sheetLabel + '.xlsx';
  const wbout = XLSX.write(wb, { bookType: 'xlsx', type: 'array' });
  const blob = new Blob([wbout], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  setTimeout(function() { document.body.removeChild(a); URL.revokeObjectURL(url); }, 1000);
  const dispLabel = s === e ? s : s + ' ~ ' + e;
  showToast('📥 ' + dispLabel + ' 다운로드 완료! (' + entries.length + '건)');
}

// ── DETAIL ──
function openDetail(idx) {
  detailEntryIndex = idx;
  const x = allEntries[idx];
  if (!x) return;
  const badge = document.getElementById('detail-badge');
  badge.textContent = x.type === 'schedule' ? '일정' : '계획';
  badge.className = 'detail-type-badge ' + x.type;
  document.getElementById('detail-location').textContent = x.location;
  const d = new Date(x.date + 'T00:00:00');
  const dayNames = ['일','월','화','수','목','금','토'];
  const parts = x.date.split('-');
  document.getElementById('detail-date').textContent =
    parts[0] + '년 ' + parseInt(parts[1]) + '월 ' + parseInt(parts[2]) + '일 (' + dayNames[d.getDay()] + ')';
  let rows = '';
  rows += '<div class="detail-row"><div class="detail-row-label">은행</div>' +
    '<div class="detail-row-value' + (x.bank ? '' : ' empty') + '">' + (x.bank || '선택 안함') + '</div></div>';
  if (x.type === 'schedule') {
    rows += '<div class="detail-row"><div class="detail-row-label">판매인</div>' +
      '<div class="detail-row-value' + (x.seller ? '' : ' empty') + '">' + (x.seller || '입력 없음') + '</div></div>';
    rows += '<div class="detail-row"><div class="detail-row-label">내용</div>' +
      '<div class="detail-row-value' + (x.content ? '' : ' empty') + '">' + (esc(x.content) || '입력 없음') + '</div></div>';
  }
  rows += '<div class="detail-row"><div class="detail-row-label">등록 시각</div>' +
    '<div class="detail-row-value">' + (x.createdAt ? new Date(x.createdAt).toLocaleString('ko-KR') : '-') + '</div></div>';
  document.getElementById('detail-rows').innerHTML = rows;
  document.getElementById('detail-overlay').classList.add('visible');
}
function closeDetail(ev) {
  if (ev && ev.target !== document.getElementById('detail-overlay')) return;
  document.getElementById('detail-overlay').classList.remove('visible');
}

// ── DELETE ──
function confirmDelete() { document.getElementById('confirm-overlay').classList.add('visible'); }
function closeConfirm()  { document.getElementById('confirm-overlay').classList.remove('visible'); }
async function doDelete() {
  if (detailEntryIndex === null) return;
  allEntries.splice(detailEntryIndex, 1);
  await syncToServer();
  closeConfirm();
  document.getElementById('detail-overlay').classList.remove('visible');
  renderRecords(); renderCalendar(); renderStats(); renderRecent();
  showToast('🗑 삭제되었습니다');
}

// ── UTIL ──
function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── KEYBOARD SHAKE FIX ──
// 키보드 등장 시 하단 버튼 위치 조정 (iOS 오버레이 키보드 대응)
(function() {
  if (!window.visualViewport) return;
  function updateKeyboardInset() {
    var kb = Math.max(0, window.innerHeight - window.visualViewport.offsetTop - window.visualViewport.height);
    document.documentElement.style.setProperty('--keyboard-inset', kb + 'px');
  }
  window.visualViewport.addEventListener('resize', updateKeyboardInset, { passive: true });
  window.visualViewport.addEventListener('scroll', updateKeyboardInset, { passive: true });
  updateKeyboardInset();
})();

// 이미 포커스된 입력창 내 커서 이동 시 스크롤 잠금 (흔들림 방지)
(function() {
  document.addEventListener('touchstart', function(e) {
    var el = e.target;
    if ((el.tagName === 'INPUT' || el.tagName === 'TEXTAREA') && el === document.activeElement) {
      var fb = el.closest && el.closest('.form-body');
      if (!fb) return;
      var st = fb.scrollTop;
      requestAnimationFrame(function() {
        requestAnimationFrame(function() {
          fb.scrollTop = st;
        });
      });
    }
  }, { passive: true });
})();

// ── START ──
init();
